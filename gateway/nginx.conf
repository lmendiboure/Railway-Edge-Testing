worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  server {
    listen 80;
    server_name _;

    location = / {
      root /usr/share/nginx/html;
      try_files /index.html =404;
    }

    location = /edge {
      return 301 /edge/;
    }

    location = /security {
      return 301 /security/;
    }

    location /edge/ {
      proxy_pass http://edge-gui:8501/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /security/ {
      proxy_pass http://security-gui:8601/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /edge-api/ {
      proxy_pass http://edge-simulator:8080/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /security-api/ {
      proxy_pass http://security-simulator:8090/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
