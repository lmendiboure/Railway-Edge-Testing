<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Railway Edge Gateway</title>
    <style>
      body {
        font-family: "Space Grotesk", sans-serif;
        margin: 32px;
        color: #1f2a33;
        background: radial-gradient(circle at 20% 20%, #f0f3ff, #ffffff 45%),
          radial-gradient(circle at 80% 0%, #fef0f5, #ffffff 40%);
        min-height: 100vh;
      }
      h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }
      ul {
        padding-left: 18px;
      }
      a {
        color: #1f4db8;
      }
      code {
        background: #f4f4f4;
        padding: 2px 6px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <h1>Railway Edge Gateway</h1>
    <p>Use the links below to access the GUIs and APIs without specifying ports.</p>
    <ul>
      <li><a href="/edge/">Edge GUI</a> (<code>/edge/</code>)</li>
      <li><a href="/security/">Security GUI</a> (<code>/security/</code>)</li>
      <li><a href="/edge-api/agents">Edge API</a> (<code>/edge-api/agents</code>)</li>
      <li><a href="/security-api/agents">Security API</a> (<code>/security-api/agents</code>)</li>
    </ul>
  </body>
</html>
